repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-ast
      - id: trailing-whitespace
      - id: check-toml
      - id: end-of-file-fixer

  - repo: local
    hooks:
      - id: format
        name: Formatting
        entry: uv run ruff format
        language: system
        types: [python]

      - id: ruff
        name: Run ruff lints
        entry: uv run ruff
        language: system
        pass_filenames: false
        types: [python]
        args:
          - "check"
          - "--fix"
          - "codesight_backend"

      - id: mypy
        name: Validate types with MyPy
        entry: uv run mypy
        language: system
        pass_filenames: false
        types: [python]
        args:
          - ./codesight_backend
